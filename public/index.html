<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Universe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }
    #hud {
      position: fixed; bottom: 10px; left: 10px; right: 10px;
      display: flex; gap: 6px; justify-content: center;
      pointer-events: none; z-index: 100; flex-wrap: wrap;
    }
    .card {
      background: rgba(0,0,0,0.85); border: 1px solid #0f0;
      padding: 4px 8px; border-radius: 4px; color: #fff;
      text-align: center; min-width: 70px; font-size: 10px;
    }
    .card .name { font-weight: bold; font-size: 11px; }
  </style>
</head>
<body>
  <div id="hud"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // === SCENE ===
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Sky blue

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 5, 18);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.prepend(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI * 0.48;
    controls.target.set(0, 2, 0);

    // === LIGHTING — daylight ===
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xfff5e0, 1.8);
    sun.position.set(15, 25, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -30;
    sun.shadow.camera.right = 30;
    sun.shadow.camera.top = 20;
    sun.shadow.camera.bottom = -20;
    scene.add(sun);

    // === OUTDOOR ENVIRONMENT ===
    // Ground (grass)
    const grassGeo = new THREE.PlaneGeometry(100, 100);
    const grassMat = new THREE.MeshStandardMaterial({ color: 0x4a8c3f, roughness: 0.9 });
    const grass = new THREE.Mesh(grassGeo, grassMat);
    grass.rotation.x = -Math.PI / 2;
    grass.receiveShadow = true;
    scene.add(grass);

    // Concrete patio/floor where characters stand
    const concreteGeo = new THREE.PlaneGeometry(30, 16);
    const concreteMat = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.7 });
    const concrete = new THREE.Mesh(concreteGeo, concreteMat);
    concrete.rotation.x = -Math.PI / 2;
    concrete.position.y = 0.02;
    concrete.receiveShadow = true;
    scene.add(concrete);

    // === BUILDING — Back wall (office/lobby) ===
    const wallMat = new THREE.MeshStandardMaterial({ color: 0xe8e0d0, roughness: 0.8 });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5 });
    const glassMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.4, roughness: 0.1, metalness: 0.3 });

    // Main back wall
    const backWall = new THREE.Mesh(new THREE.BoxGeometry(30, 8, 0.3), wallMat);
    backWall.position.set(0, 4, -8);
    backWall.castShadow = true;
    backWall.receiveShadow = true;
    scene.add(backWall);

    // Side walls
    const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.3, 8, 16), wallMat);
    leftWall.position.set(-15, 4, 0);
    leftWall.castShadow = true;
    scene.add(leftWall);

    const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.3, 8, 16), wallMat);
    rightWall.position.set(15, 4, 0);
    rightWall.castShadow = true;
    scene.add(rightWall);

    // Roof/ceiling overhang
    const roof = new THREE.Mesh(new THREE.BoxGeometry(32, 0.3, 18), darkMat);
    roof.position.set(0, 8, 0);
    roof.castShadow = true;
    scene.add(roof);

    // Large windows on back wall
    for (let i = -2; i <= 2; i++) {
      const win = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 0.1), glassMat);
      win.position.set(i * 5, 4, -7.7);
      scene.add(win);
      // Window frame
      const frame = new THREE.Mesh(new THREE.BoxGeometry(3.3, 4.3, 0.15), darkMat);
      frame.position.set(i * 5, 4, -7.8);
      scene.add(frame);
    }

    // Front door
    const door = new THREE.Mesh(new THREE.BoxGeometry(2.5, 4, 0.15), new THREE.MeshStandardMaterial({ color: 0x5c3a21 }));
    door.position.set(0, 2, 8);
    scene.add(door);
    const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(2.8, 4.3, 0.15), darkMat);
    doorFrame.position.set(0, 2.15, 8);
    scene.add(doorFrame);

    // Reception desk
    const deskMat = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.4 });
    const desk = new THREE.Mesh(new THREE.BoxGeometry(6, 1.2, 1.5), deskMat);
    desk.position.set(0, 0.6, -5);
    desk.castShadow = true;
    scene.add(desk);
    // Desk top
    const deskTop = new THREE.Mesh(new THREE.BoxGeometry(6.2, 0.08, 1.7), new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.2 }));
    deskTop.position.set(0, 1.24, -5);
    scene.add(deskTop);

    // Potted plants
    function addPlant(x, z) {
      const pot = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.25, 0.5, 8),
        new THREE.MeshStandardMaterial({ color: 0x8B4513 })
      );
      pot.position.set(x, 0.25, z);
      scene.add(pot);
      const leaves = new THREE.Mesh(
        new THREE.SphereGeometry(0.6, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0x2d5a27 })
      );
      leaves.position.set(x, 0.9, z);
      scene.add(leaves);
    }
    addPlant(-12, -5);
    addPlant(12, -5);
    addPlant(-12, 5);
    addPlant(12, 5);

    // Sofas/seating
    function addSofa(x, z, rot = 0) {
      const sofaMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
      const base = new THREE.Mesh(new THREE.BoxGeometry(3, 0.5, 1.2), sofaMat);
      base.position.set(x, 0.35, z);
      base.rotation.y = rot;
      base.castShadow = true;
      scene.add(base);
      const back = new THREE.Mesh(new THREE.BoxGeometry(3, 0.8, 0.3), sofaMat);
      back.position.set(x, 0.7, z - 0.45);
      back.rotation.y = rot;
      scene.add(back);
    }
    addSofa(-8, -3);
    addSofa(8, -3);
    addSofa(0, 2);

    // Coffee table
    const tableMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.3 });
    function addTable(x, z) {
      const top = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.08, 0.8), tableMat);
      top.position.set(x, 0.55, z);
      top.castShadow = true;
      scene.add(top);
      // Legs
      const legGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.55, 6);
      const legMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
      [[-0.6, -0.3], [0.6, -0.3], [-0.6, 0.3], [0.6, 0.3]].forEach(([dx, dz]) => {
        const leg = new THREE.Mesh(legGeo, legMat);
        leg.position.set(x + dx, 0.275, z + dz);
        scene.add(leg);
      });
    }
    addTable(-8, 0);
    addTable(8, 0);

    // Wall art (framed pictures)
    function addArt(x, y, z, color) {
      const frame = new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, 0.1), darkMat);
      frame.position.set(x, y, z);
      scene.add(frame);
      const art = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.3, 0.05), new THREE.MeshStandardMaterial({ color }));
      art.position.set(x, y, z + 0.08);
      scene.add(art);
    }
    addArt(-10, 5, -7.6, 0x3498db);
    addArt(-5, 5, -7.6, 0xe74c3c);
    addArt(5, 5, -7.6, 0x2ecc71);
    addArt(10, 5, -7.6, 0xf39c12);

    // Floor rug
    const rugGeo = new THREE.PlaneGeometry(8, 4);
    const rugMat = new THREE.MeshStandardMaterial({ color: 0x8B0000, roughness: 0.95 });
    const rug = new THREE.Mesh(rugGeo, rugMat);
    rug.rotation.x = -Math.PI / 2;
    rug.position.set(0, 0.03, 0);
    scene.add(rug);

    // Ceiling lights
    for (let i = -2; i <= 2; i++) {
      const light = new THREE.PointLight(0xfff5e0, 0.5, 15);
      light.position.set(i * 5, 7.5, 0);
      scene.add(light);
      const fixture = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.4, 0.2, 8),
        new THREE.MeshStandardMaterial({ color: 0xcccccc, emissive: 0xfff5e0, emissiveIntensity: 0.5 })
      );
      fixture.position.set(i * 5, 7.8, 0);
      scene.add(fixture);
    }

    // === CHARACTERS ===
    const charData = [
      { id:'omar', name:'Omar Campbell', color:0x00ddff, desc:'Jamaican', ladies:true },
      { id:'tony', name:'Tony Blake', color:0xff8844, desc:'Jamaican', ladies:true },
      { id:'marcus', name:'Marcus Johnson', color:0x4488ff, desc:'Black American' },
      { id:'kwame', name:'Kwame Asante', color:0xffaa00, desc:'African' },
      { id:'deon', name:'Deon Carter', color:0xaa44ff, desc:'Mixed Black' },
      { id:'carlos', name:'Carlos Rivera', color:0x88ff00, desc:'Colombian' },
      { id:'miguel', name:'Miguel Torres', color:0x44ffaa, desc:'Mexican' },
      { id:'jin', name:'Jin Park', color:0xff4488, desc:'Korean' },
      { id:'rafael', name:'Rafael Santos', color:0x44aaff, desc:'Brazilian' },
      { id:'kai', name:'Kai Nakamura', color:0xddff00, desc:'Japanese' },
      { id:'sofia', name:'Sofia Martinez', color:0xff44aa, desc:'Colombian' },
      { id:'valentina', name:'Valentina Cruz', color:0xff2266, desc:'Colombian' },
      { id:'isabella', name:'Isabella Rodriguez', color:0xaa44ff, desc:'Colombian' },
      { id:'mariana', name:'Mariana Lopez', color:0xff88cc, desc:'Colombian' },
      { id:'camila', name:'Camila Gutierrez', color:0xff4466, desc:'Colombian' },
      { id:'ana', name:'Ana Patricia', color:0xff6644, desc:'Colombian' },
      { id:'rosa', name:'Rosa Hernandez', color:0x44aaff, desc:'Dominican' },
      { id:'nayeli', name:'Nayeli Fernandez', color:0x44ddff, desc:'Puerto Rican' },
      { id:'mia', name:'Mia Torres', color:0xffaa66, desc:'Puerto Rican' },
      { id:'yolanda', name:'Yolanda Vega', color:0xddff00, desc:'Dominican' },
      { id:'carmen', name:'Carmen Ruiz', color:0xff44cc, desc:'Mexican' },
      { id:'leticia', name:'Leticia Santos', color:0x66ff44, desc:'Brazilian' },
      { id:'luna', name:'Luna Sanchez', color:0x8844ff, desc:'Mexican' },
      { id:'naomi', name:'Naomi Clarke', color:0x44ffcc, desc:'Jamaican' },
      { id:'shanice', name:'Shanice Brown', color:0xff6688, desc:'Jamaican' },
      { id:'keisha', name:'Keisha Campbell', color:0xff8844, desc:'Jamaican' },
      { id:'aliyah', name:'Aliyah Davis', color:0xff8866, desc:'Black American' },
      { id:'jasmine', name:'Jasmine Okafor', color:0x66aaff, desc:'Nigerian' },
      { id:'emma', name:'Emma Wilson', color:0xaa66ff, desc:'American' },
      { id:'hanna', name:'Hanna Brooks', color:0x44ff88, desc:'American' },
    ];

    const textureLoader = new THREE.TextureLoader();
    const characters = [];

    function createCharacter(data, index) {
      const group = new THREE.Group();

      // Load portrait texture
      const texture = textureLoader.load(`/portraits/${data.id}.png`);
      texture.colorSpace = THREE.SRGBColorSpace;

      // Character as flat panel (like a standee) — shows the full body photo
      const panelGeo = new THREE.PlaneGeometry(1.0, 1.5);
      const panelMat = new THREE.MeshStandardMaterial({
        map: texture,
        side: THREE.DoubleSide,
        roughness: 0.6,
        transparent: true,
      });
      const panel = new THREE.Mesh(panelGeo, panelMat);
      panel.position.y = 0.9;
      panel.castShadow = true;
      group.add(panel);

      // Small shadow disc under character
      const shadowGeo = new THREE.CircleGeometry(0.4, 16);
      const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
      const shadow = new THREE.Mesh(shadowGeo, shadowMat);
      shadow.rotation.x = -Math.PI / 2;
      shadow.position.y = 0.03;
      group.add(shadow);

      // Position: spread around the lobby
      const angle = (index / 30) * Math.PI * 2;
      const radius = 3 + (index % 4) * 2;
      group.position.set(
        Math.cos(angle) * radius,
        0,
        Math.sin(angle) * radius * 0.6
      );

      group.userData = {
        data,
        panel,
        speaking: false,
        speakingTimer: 0,
        targetPos: null,
        walkSpeed: 1.0 + Math.random() * 0.5,
        animT: Math.random() * 10,
      };

      scene.add(group);
      return group;
    }

    // Load all characters
    charData.forEach((data, i) => {
      characters.push(createCharacter(data, i));
    });

    // === SIM ENGINE ===
    const dialogs = [
      { t: 1, c: 'tony', msg: "Welcome to AI Universe!" },
      { t: 3, c: 'sofia', msg: "This place is beautiful!" },
      { t: 5, c: 'omar', msg: "Yow, nice lobby!" },
      { t: 7, c: 'ana', msg: "Our office looks great." },
      { t: 9, c: 'marcus', msg: "30 characters, real place." },
      { t: 11, c: 'isabella', msg: "I love the decor." },
      { t: 13, c: 'rosa', msg: "Team meeting in 5 minutes." },
      { t: 15, c: 'valentina', msg: "Omar, you looking fine!" },
      { t: 17, c: 'naomi', msg: "Tony, mi need your number!" },
      { t: 19, c: 'shanice', msg: "This lobby is fire." },
      { t: 22, c: 'kwame', msg: "Let me focus on work." },
      { t: 25, c: 'luna', msg: "Marketing update ready!" },
      { t: 28, c: 'mia', msg: "Closing deals today." },
      { t: 31, c: 'deon', msg: "Investment approved." },
      { t: 34, c: 'yolanda', msg: "Budget looks solid." },
      { t: 37, c: 'carlos', msg: "Design is fire, hermano." },
      { t: 40, c: 'aliyah', msg: "Something special here." },
      { t: 45, c: 'leticia', msg: "Tests passing. Ship it!" },
      { t: 50, c: 'camila', msg: "This is the future." },
    ];

    let simSecond = 0;
    setInterval(() => {
      simSecond++;
      dialogs.filter(d => d.t === simSecond).forEach(e => {
        const c = characters.find(g => g.userData.data.id === e.c);
        if (c) { c.userData.speaking = true; c.userData.speakingTimer = 4; }
      });

      // Random walking
      if (simSecond % 4 === 0) {
        const walker = characters[Math.floor(Math.random() * characters.length)];
        if (!walker.userData.targetPos) {
          walker.userData.targetPos = new THREE.Vector3(
            (Math.random() - 0.5) * 20,
            0,
            (Math.random() - 0.5) * 10
          );
        }
      }

      // Jamaican players — women walk toward them
      if (simSecond % 10 === 0) {
        const players = characters.filter(g => g.userData.data.ladies);
        const women = characters.filter(g => !g.userData.data.ladies && !g.userData.targetPos);
        if (women.length) {
          players.forEach(p => {
            const w = women[Math.floor(Math.random() * women.length)];
            if (w) w.userData.targetPos = new THREE.Vector3(
              p.position.x + (Math.random() - 0.5) * 1.5,
              0,
              p.position.z + (Math.random() - 0.5) * 1.5
            );
          });
        }
      }
    }, 1000);

    // === HUD ===
    let hudTimer = 0;
    let hudChars = characters.slice(0, 6);
    setInterval(() => {
      const start = Math.floor(Math.random() * characters.length);
      hudChars = [];
      for (let i = 0; i < 6; i++) hudChars.push(characters[(start + i) % characters.length]);
    }, 5000);

    function updateHUD() {
      const hud = document.getElementById('hud');
      const speakers = characters.filter(c => c.userData.speaking);
      const show = speakers.length ? speakers : hudChars;
      hud.innerHTML = show.map(c => {
        const hex = '#' + c.userData.data.color.toString(16).padStart(6, '0');
        return `<div class="card" style="border-color:${hex}">
          <div class="name" style="color:${hex}">${c.userData.data.name}</div>
          <div>${c.userData.data.desc}</div>
        </div>`;
      }).join('');
    }

    // === ANIMATION ===
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const t = clock.elapsedTime;

      characters.forEach(g => {
        const ud = g.userData;
        // Sway
        ud.panel.rotation.y = Math.sin(t * 0.5 + ud.animT) * 0.08;

        // Walk
        if (ud.targetPos) {
          const dx = ud.targetPos.x - g.position.x;
          const dz = ud.targetPos.z - g.position.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          if (dist > 0.3) {
            g.position.x += (dx / dist) * ud.walkSpeed * dt;
            g.position.z += (dz / dist) * ud.walkSpeed * dt;
            g.lookAt(camera.position.x, 0, camera.position.z);
          } else ud.targetPos = null;
        }

        // Face camera
        if (!ud.targetPos) g.lookAt(camera.position.x, 0, camera.position.z);

        // Speaking
        if (ud.speaking) {
          ud.speakingTimer -= dt;
          ud.panel.scale.y = 1.0 + Math.sin(t * 12) * 0.03;
          if (ud.speakingTimer <= 0) { ud.speaking = false; ud.panel.scale.y = 1.0; }
        }

        // Bounds
        g.position.x = Math.max(-13, Math.min(13, g.position.x));
        g.position.z = Math.max(-6, Math.min(6, g.position.z));
      });

      controls.update();
      renderer.render(scene, camera);
      updateHUD();
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log('AI Universe — lobby scene loaded');
  </script>
</body>
</html>
