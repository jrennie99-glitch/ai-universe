<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Universe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }
    #overlay {
      position: fixed; top: 10px; left: 10px;
      color: #0f0; font-size: 12px; z-index: 100;
      text-shadow: 0 0 8px rgba(0,255,136,0.5);
      pointer-events: none;
    }
    #hud {
      position: fixed; bottom: 10px; left: 10px; right: 10px;
      display: flex; gap: 6px; justify-content: center;
      pointer-events: none; z-index: 100; flex-wrap: wrap;
    }
    .card {
      background: rgba(0,0,0,0.85); border: 1px solid #0f0;
      padding: 4px 8px; border-radius: 4px; color: #fff;
      text-align: center; min-width: 80px; font-size: 10px;
    }
    .card .name { font-weight: bold; font-size: 11px; }
    .card .dialog { font-size: 9px; margin-top: 2px; color: #ccc; max-width: 140px; }
  </style>
</head>
<body>
  <div id="overlay">
    <div>🔥 AI UNIVERSE</div>
    <div id="fps">FPS: --</div>
    <div id="chars">Characters: 30</div>
  </div>
  <div id="hud"></div>
  
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { FontLoader } from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

    // === SCENE SETUP ===
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    scene.fog = new THREE.FogExp2(0x050510, 0.012);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.prepend(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 5;
    controls.maxDistance = 60;
    controls.maxPolarAngle = Math.PI * 0.45;
    controls.target.set(0, 1.5, 0);

    // === LIGHTING ===
    const ambient = new THREE.AmbientLight(0x1a1a3a, 0.8);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffeedd, 1.5);
    sun.position.set(10, 20, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -30;
    sun.shadow.camera.right = 30;
    sun.shadow.camera.top = 20;
    sun.shadow.camera.bottom = -20;
    scene.add(sun);

    const fill = new THREE.DirectionalLight(0x4488ff, 0.3);
    fill.position.set(-10, 5, -10);
    scene.add(fill);

    // Neon accent lights
    const greenSpot = new THREE.SpotLight(0x00ff88, 2, 30, Math.PI * 0.3, 0.5);
    greenSpot.position.set(0, 12, 0);
    greenSpot.target.position.set(0, 0, 0);
    scene.add(greenSpot, greenSpot.target);

    const blueSpot = new THREE.SpotLight(0x0066ff, 1, 25, Math.PI * 0.4, 0.6);
    blueSpot.position.set(-15, 10, 5);
    scene.add(blueSpot);

    const pinkSpot = new THREE.SpotLight(0xff0066, 1, 25, Math.PI * 0.4, 0.6);
    pinkSpot.position.set(15, 10, -5);
    scene.add(pinkSpot);

    // === ENVIRONMENT ===
    // Floor
    const floorGeo = new THREE.PlaneGeometry(80, 60);
    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x0a0a15,
      roughness: 0.8,
      metalness: 0.2
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Neon ring
    const ringPoints = [];
    for (let i = 0; i <= 64; i++) {
      const a = (i / 64) * Math.PI * 2;
      ringPoints.push(new THREE.Vector3(Math.cos(a) * 12, 0.02, Math.sin(a) * 6));
    }
    const ringCurve = new THREE.CatmullRomCurve3(ringPoints, true);
    const ringGeo = new THREE.TubeGeometry(ringCurve, 128, 0.05, 8, true);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    scene.add(ring);

    // Ring glow
    const glowRing = ring.clone();
    glowRing.material = new THREE.MeshBasicMaterial({
      color: 0x00ff88,
      transparent: true,
      opacity: 0.15,
    });
    glowRing.scale.set(1.5, 0.01, 1.5);
    scene.add(glowRing);

    // Center platform
    const platGeo = new THREE.CylinderGeometry(2, 2.5, 0.15, 8);
    const platMat = new THREE.MeshStandardMaterial({
      color: 0x1a2a1a,
      emissive: 0x003311,
      emissiveIntensity: 0.3,
      metalness: 0.7,
      roughness: 0.3
    });
    const platform = new THREE.Mesh(platGeo, platMat);
    platform.position.y = 0.075;
    platform.castShadow = true;
    scene.add(platform);

    // Floor grid helper
    const grid = new THREE.GridHelper(80, 40, 0x111133, 0x0a0a22);
    grid.position.y = 0.01;
    scene.add(grid);

    // === CHARACTERS (30) ===
    const SKIN = {
      light: 0xf5d0a9,
      medium: 0xc68642,
      tan: 0xd4a574,
      bronze: 0xa0522d,
      brown: 0x8b6914,
      dark: 0x5c4033,
      deep: 0x3b2417
    };

    const hairColors = [0x1a0a00, 0x2d1810, 0x4a2a10, 0x0d0d0d, 0x3a2215, 0x1c1c1c, 0x5c3a20, 0x000000];

    const charData = [
      // 10 MEN
      { id:'omar', name:'Omar Campbell', color:0x00ddff, gender:'M', role:'Player', skin:SKIN.deep, build:'athletic', desc:'Jamaican', ladies:true },
      { id:'tony', name:'Tony Blake', color:0xff8844, gender:'M', role:'CEO', skin:SKIN.brown, build:'athletic', desc:'Jamaican', ladies:true },
      { id:'marcus', name:'Marcus Johnson', color:0x4488ff, gender:'M', role:'CTO', skin:SKIN.dark, build:'broad', desc:'Black American' },
      { id:'kwame', name:'Kwame Asante', color:0xffaa00, gender:'M', role:'Engineer', skin:SKIN.deep, build:'athletic', desc:'African (Ghana)' },
      { id:'deon', name:'Deon Carter', color:0xaa44ff, gender:'M', role:'Investor', skin:SKIN.brown, build:'broad', desc:'Mixed Black' },
      { id:'carlos', name:'Carlos Rivera', color:0x88ff00, gender:'M', role:'Designer', skin:SKIN.tan, build:'athletic', desc:'Colombian' },
      { id:'miguel', name:'Miguel Torres', color:0x44ffaa, gender:'M', role:'Marketer', skin:SKIN.medium, build:'lean', desc:'Mexican' },
      { id:'jin', name:'Jin Park', color:0xff4488, gender:'M', role:'Freelancer', skin:SKIN.light, build:'lean', desc:'Korean' },
      { id:'rafael', name:'Rafael Santos', color:0x44aaff, gender:'M', role:'Lawyer', skin:SKIN.bronze, build:'athletic', desc:'Brazilian' },
      { id:'kai', name:'Kai Nakamura', color:0xddff00, gender:'M', role:'Mentor', skin:SKIN.light, build:'lean', desc:'Japanese' },
      // 20 WOMEN
      { id:'sofia', name:'Sofia Martinez', color:0xff44aa, gender:'F', role:'Co-Founder', skin:SKIN.tan, build:'fit', desc:'Colombian' },
      { id:'valentina', name:'Valentina Cruz', color:0xff2266, gender:'F', role:'VP Eng', skin:SKIN.bronze, build:'athletic', desc:'Colombian' },
      { id:'isabella', name:'Isabella Rodriguez', color:0xaa44ff, gender:'F', role:'Product Lead', skin:SKIN.tan, build:'fit', desc:'Colombian' },
      { id:'mariana', name:'Mariana Lopez', color:0xff88cc, gender:'F', role:'Sales Lead', skin:SKIN.medium, build:'athletic', desc:'Colombian' },
      { id:'camila', name:'Camila Gutierrez', color:0xff4466, gender:'F', role:'PR Manager', skin:SKIN.bronze, build:'fit', desc:'Colombian' },
      { id:'ana', name:'Ana Patricia', color:0xff6644, gender:'F', role:'CFO', skin:SKIN.tan, build:'curvy', desc:'Colombian' },
      { id:'rosa', name:'Rosa Hernandez', color:0x44aaff, gender:'F', role:'HR Director', skin:SKIN.tan, build:'curvy', desc:'Dominican' },
      { id:'nayeli', name:'Nayeli Fernandez', color:0x44ddff, gender:'F', role:'Strategist', skin:SKIN.medium, build:'fit', desc:'Puerto Rican' },
      { id:'mia', name:'Mia Torres', color:0xffaa66, gender:'F', role:'Architect', skin:SKIN.tan, build:'fit', desc:'Puerto Rican' },
      { id:'yolanda', name:'Yolanda Vega', color:0xddff00, gender:'F', role:'Accountant', skin:SKIN.bronze, build:'athletic', desc:'Dominican' },
      { id:'carmen', name:'Carmen Ruiz', color:0xff44cc, gender:'F', role:'UX Researcher', skin:SKIN.medium, build:'fit', desc:'Mexican' },
      { id:'leticia', name:'Leticia Santos', color:0x66ff44, gender:'F', role:'Designer', skin:SKIN.bronze, build:'fit', desc:'Brazilian' },
      { id:'luna', name:'Luna Sanchez', color:0x8844ff, gender:'F', role:'Marketer', skin:SKIN.medium, build:'athletic', desc:'Mexican' },
      { id:'naomi', name:'Naomi Clarke', color:0x44ffcc, gender:'F', role:'Data Scientist', skin:SKIN.deep, build:'fit', desc:'Jamaican' },
      { id:'shanice', name:'Shanice Brown', color:0xff6688, gender:'F', role:'Content Creator', skin:SKIN.brown, build:'curvy', desc:'Jamaican' },
      { id:'keisha', name:'Keisha Campbell', color:0xff8844, gender:'F', role:'Influencer', skin:SKIN.deep, build:'athletic', desc:'Jamaican' },
      { id:'aliyah', name:'Aliyah Davis', color:0xff8866, gender:'F', role:'Analyst', skin:SKIN.dark, build:'athletic', desc:'Black American' },
      { id:'jasmine', name:'Jasmine Okafor', color:0x66aaff, gender:'F', role:'Photographer', skin:SKIN.dark, build:'athletic', desc:'Nigerian' },
      { id:'emma', name:'Emma Wilson', color:0xaa66ff, gender:'F', role:'Intern', skin:SKIN.light, build:'fit', desc:'American' },
      { id:'hanna', name:'Hanna Brooks', color:0x44ff88, gender:'F', role:'QA Lead', skin:SKIN.light, build:'fit', desc:'American' },
    ];

    // === CREATE 3D CHARACTER ===
    function createCharacter(charDef, index) {
      const group = new THREE.Group();

      // Skin material
      const skinMat = new THREE.MeshStandardMaterial({
        color: charDef.skin,
        roughness: 0.7,
        metalness: 0.1
      });

      // Outfit color
      const outfitMat = new THREE.MeshStandardMaterial({
        color: charDef.color,
        roughness: 0.5,
        metalness: 0.2
      });

      const hc = hairColors[index % hairColors.length];
      const hairMat = new THREE.MeshStandardMaterial({
        color: hc,
        roughness: 0.9
      });

      const isF = charDef.gender === 'F';
      const isBroad = charDef.build === 'broad';
      const isAthletic = charDef.build === 'athletic' || charDef.build === 'fit';
      const isCurvy = charDef.build === 'curvy';
      const isLean = charDef.build === 'lean';

      // Legs
      const legGeo = new THREE.CylinderGeometry(0.08, 0.1, 0.9, 8);
      const leftLeg = new THREE.Mesh(legGeo, outfitMat);
      leftLeg.position.set(-0.12, 0.45, 0);
      leftLeg.castShadow = true;
      group.add(leftLeg);
      const rightLeg = new THREE.Mesh(legGeo, outfitMat);
      rightLeg.position.set(0.12, 0.45, 0);
      rightLeg.castShadow = true;
      group.add(rightLeg);

      // Torso
      let torsoGeo;
      if (isBroad) {
        torsoGeo = new THREE.CylinderGeometry(0.18, 0.22, 0.7, 8);
      } else if (isLean || isF) {
        if (isCurvy) {
          torsoGeo = new THREE.CylinderGeometry(0.14, 0.2, 0.7, 8);
        } else {
          torsoGeo = new THREE.CylinderGeometry(0.12, 0.15, 0.7, 8);
        }
      } else {
        torsoGeo = new THREE.CylinderGeometry(0.15, 0.18, 0.7, 8);
      }
      const torso = new THREE.Mesh(torsoGeo, outfitMat);
      torso.position.y = 1.2;
      torso.castShadow = true;
      group.add(torso);

      // Shoulders
      if (!isF && !isLean) {
        const shGeo = new THREE.BoxGeometry(isBroad ? 0.7 : 0.55, 0.08, 0.15);
        const shoulders = new THREE.Mesh(shGeo, outfitMat);
        shoulders.position.y = 1.5;
        group.add(shoulders);
      }

      // Arms
      const armGeo = new THREE.CylinderGeometry(0.05, 0.06, 0.55, 8);
      const leftArm = new THREE.Mesh(armGeo, skinMat);
      leftArm.position.set(-0.25, 1.25, 0);
      leftArm.rotation.z = 0.15;
      leftArm.castShadow = true;
      group.add(leftArm);
      const rightArm = new THREE.Mesh(armGeo, skinMat);
      rightArm.position.set(0.25, 1.25, 0);
      rightArm.rotation.z = -0.15;
      rightArm.castShadow = true;
      group.add(rightArm);

      // Head
      const headGeo = new THREE.SphereGeometry(0.16, 16, 16);
      const head = new THREE.Mesh(headGeo, skinMat);
      head.position.y = 1.7;
      head.castShadow = true;
      group.add(head);

      // Hair
      if (isF) {
        // Long hair
        const hairGeo = new THREE.SphereGeometry(0.18, 16, 16, 0, Math.PI * 2, 0, Math.PI * 0.7);
        const hair = new THREE.Mesh(hairGeo, hairMat);
        hair.position.y = 1.72;
        group.add(hair);
        // Side hair strands
        const strandGeo = new THREE.CylinderGeometry(0.03, 0.02, 0.4, 6);
        const lStrand = new THREE.Mesh(strandGeo, hairMat);
        lStrand.position.set(-0.17, 1.55, 0.03);
        lStrand.rotation.z = 0.2;
        group.add(lStrand);
        const rStrand = new THREE.Mesh(strandGeo, hairMat);
        rStrand.position.set(0.17, 1.55, 0.03);
        rStrand.rotation.z = -0.2;
        group.add(rStrand);
      } else {
        // Short hair
        const hairGeo = new THREE.SphereGeometry(0.17, 16, 16, 0, Math.PI * 2, 0, Math.PI * 0.55);
        const hair = new THREE.Mesh(hairGeo, hairMat);
        hair.position.y = 1.72;
        group.add(hair);
      }

      // Eyes
      const eyeGeo = new THREE.SphereGeometry(0.025, 8, 8);
      const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const pupilGeo = new THREE.SphereGeometry(0.012, 8, 8);
      const pupilMat = new THREE.MeshBasicMaterial({ color: 0x111111 });

      [-0.05, 0.05].forEach(x => {
        const eye = new THREE.Mesh(eyeGeo, eyeMat);
        eye.position.set(x, 1.72, 0.14);
        group.add(eye);
        const pupil = new THREE.Mesh(pupilGeo, pupilMat);
        pupil.position.set(x, 1.72, 0.16);
        group.add(pupil);
      });

      // Mouth
      const mouthGeo = new THREE.BoxGeometry(0.06, 0.015, 0.01);
      const mouthMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
      const mouth = new THREE.Mesh(mouthGeo, mouthMat);
      mouth.position.set(0, 1.65, 0.15);
      group.add(mouth);

      // Shoes
      const shoeGeo = new THREE.BoxGeometry(0.1, 0.05, 0.15);
      const shoeMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
      [-0.12, 0.12].forEach(x => {
        const shoe = new THREE.Mesh(shoeGeo, shoeMat);
        shoe.position.set(x, 0.025, 0.02);
        group.add(shoe);
      });

      // Name label (sprite)
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 96;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.roundRect(0, 0, 512, 96, 12);
      ctx.fill();
      const hexColor = '#' + charDef.color.toString(16).padStart(6, '0');
      ctx.fillStyle = hexColor;
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(charDef.name, 256, 38);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '20px monospace';
      ctx.fillText(charDef.desc + ' • ' + charDef.role, 256, 72);

      const labelTex = new THREE.CanvasTexture(canvas);
      const labelMat = new THREE.SpriteMaterial({ map: labelTex, transparent: true });
      const label = new THREE.Sprite(labelMat);
      label.position.y = 2.2;
      label.scale.set(2.0, 0.38, 1);
      group.add(label);

      // Position
      const row = Math.floor(index / 10);
      const col = index % 10;
      group.position.set((col - 4.5) * 3, 0, (row - 1) * 4);
      group.userData = {
        charDef,
        baseY: 0,
        speaking: false,
        speakingTimer: 0,
        targetPos: null,
        walkSpeed: 1.5 + Math.random(),
        animT: Math.random() * 10,
        mouth,
        leftArm,
        rightArm
      };

      scene.add(group);
      return group;
    }

    const characters = charData.map((d, i) => createCharacter(d, i));

    // === SIM ENGINE ===
    const dialogs = [
      { t: 1, c: 'tony', msg: "Welcome to AI Universe, mi bredda!" },
      { t: 3, c: 'sofia', msg: "This is incredible, papi!" },
      { t: 5, c: 'omar', msg: "Yow, who's new here?" },
      { t: 7, c: 'ana', msg: "Our numbers are looking great." },
      { t: 9, c: 'marcus', msg: "30 characters running real-time." },
      { t: 11, c: 'isabella', msg: "Users will love this update." },
      { t: 13, c: 'rosa', msg: "Team morale is at an all-time high." },
      { t: 15, c: 'valentina', msg: "Omar, you looking good today!" },
      { t: 17, c: 'naomi', msg: "Tony, mi need your number!" },
      { t: 19, c: 'shanice', msg: "These Jamaican boys are bold!" },
      { t: 22, c: 'kwame', msg: "Let me focus on the code." },
      { t: 25, c: 'luna', msg: "Marketing campaign is ready!" },
      { t: 28, c: 'mia', msg: "Closing three deals this week." },
      { t: 31, c: 'deon', msg: "I'm increasing my investment." },
      { t: 34, c: 'yolanda', msg: "Press release is drafted." },
      { t: 37, c: 'carlos', msg: "The design is fire, hermano." },
      { t: 40, c: 'aliyah', msg: "You're doing something special here." },
      { t: 45, c: 'leticia', msg: "All tests passing. Ship it!" },
      { t: 50, c: 'camila', msg: "This is the future of AI." },
    ];

    let simSecond = 0;
    setInterval(() => {
      simSecond++;
      // Trigger dialogs
      const events = dialogs.filter(d => d.t === simSecond);
      events.forEach(e => {
        const c = characters.find(g => g.userData.charDef.id === e.c);
        if (c) {
          c.userData.speaking = true;
          c.userData.speakingTimer = 4;
        }
      });

      // Random walking
      if (simSecond % 3 === 0) {
        const walker = characters[Math.floor(Math.random() * characters.length)];
        if (!walker.userData.targetPos) {
          walker.userData.targetPos = new THREE.Vector3(
            (Math.random() - 0.5) * 20,
            0,
            (Math.random() - 0.5) * 10
          );
        }
      }

      // Jamaican players — women approach them
      if (simSecond % 10 === 0) {
        const players = characters.filter(g => g.userData.charDef.ladies);
        const women = characters.filter(g => g.userData.charDef.gender === 'F' && !g.userData.targetPos);
        players.forEach(p => {
          const admirer = women[Math.floor(Math.random() * women.length)];
          if (admirer) {
            admirer.userData.targetPos = new THREE.Vector3(
              p.position.x + (Math.random() - 0.5) * 2,
              0,
              p.position.z + (Math.random() - 0.5) * 2
            );
          }
        });
      }
    }, 1000);

    // === HUD ===
    let hudVisible = characters.slice(0, 8);
    setInterval(() => {
      const start = Math.floor(Math.random() * characters.length);
      hudVisible = [];
      for (let i = 0; i < 8; i++) {
        hudVisible.push(characters[(start + i) % characters.length]);
      }
    }, 5000);

    function updateHUD() {
      const hud = document.getElementById('hud');
      const speakers = characters.filter(c => c.userData.speaking);
      const show = speakers.length ? speakers : hudVisible;
      hud.innerHTML = show.map(c => {
        const d = c.userData.charDef;
        const hexColor = '#' + d.color.toString(16).padStart(6, '0');
        return `<div class="card" style="border-color:${hexColor}">
          <div class="name" style="color:${hexColor}">${d.name}</div>
          <div class="dialog">${d.desc} • ${d.role}</div>
        </div>`;
      }).join('');
    }

    // === ANIMATION LOOP ===
    const clock = new THREE.Clock();
    let frames = 0, fpsT = 0;

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const t = clock.elapsedTime;
      frames++; fpsT += dt;
      if (fpsT >= 1) {
        document.getElementById('fps').textContent = `FPS: ${frames}`;
        frames = 0; fpsT = 0;
      }

      // Animate characters
      characters.forEach((group, i) => {
        const ud = group.userData;
        const cd = ud.charDef;

        // Idle bob
        group.position.y = Math.sin(t * 2 + ud.animT) * 0.03;

        // Walk to target
        if (ud.targetPos) {
          const dx = ud.targetPos.x - group.position.x;
          const dz = ud.targetPos.z - group.position.z;
          const dist = Math.sqrt(dx * dx + dz * dz);
          if (dist > 0.3) {
            const spd = ud.walkSpeed * dt;
            group.position.x += (dx / dist) * spd;
            group.position.z += (dz / dist) * spd;
            // Face direction
            group.rotation.y = Math.atan2(dx, dz);
            // Walk bob
            group.position.y = Math.abs(Math.sin(t * 8)) * 0.1;
            // Arm swing
            if (ud.leftArm) ud.leftArm.rotation.x = Math.sin(t * 8) * 0.5;
            if (ud.rightArm) ud.rightArm.rotation.x = -Math.sin(t * 8) * 0.5;
          } else {
            ud.targetPos = null;
          }
        }

        // Speaking animation
        if (ud.speaking) {
          ud.speakingTimer -= dt;
          if (ud.mouth) {
            ud.mouth.scale.y = 1 + Math.abs(Math.sin(t * 15)) * 3;
          }
          if (ud.speakingTimer <= 0) {
            ud.speaking = false;
            if (ud.mouth) ud.mouth.scale.y = 1;
          }
        }

        // Bounds
        group.position.x = Math.max(-25, Math.min(25, group.position.x));
        group.position.z = Math.max(-12, Math.min(12, group.position.z));
      });

      // Animate neon ring
      ringMat.color.setHSL((t * 0.05) % 1, 1, 0.5);

      controls.update();
      renderer.render(scene, camera);
      updateHUD();
    }

    animate();

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // API
    window.getSceneState = () => ({
      characters: characters.map(c => ({
        id: c.userData.charDef.id,
        name: c.userData.charDef.name,
        position: { x: c.position.x, y: c.position.y, z: c.position.z },
        speaking: c.userData.speaking
      })),
      camera: { x: camera.position.x, y: camera.position.y, z: camera.position.z }
    });

    console.log('🔥 AI Universe loaded — 30 characters, Three.js WebGL');
  </script>
</body>
</html>
