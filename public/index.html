<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Universe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow: hidden; font-family: monospace; }
    canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
    #overlay {
      position: fixed; top: 10px; left: 10px;
      color: #0f0; font-size: 12px;
      pointer-events: none; z-index: 100;
      text-shadow: 0 0 8px rgba(0,255,136,0.5);
    }
    #hud {
      position: fixed; bottom: 10px; left: 10px; right: 10px;
      display: flex; gap: 6px; justify-content: center;
      pointer-events: none; z-index: 100; flex-wrap: wrap;
      max-height: 120px; overflow: hidden;
    }
    .card {
      background: rgba(0,0,0,0.85); border: 1px solid #0f0;
      padding: 4px 8px; border-radius: 4px; color: #fff;
      text-align: center; min-width: 80px; font-size: 10px;
    }
    .card .name { font-weight: bold; font-size: 11px; color: #0f0; }
    .card .dialog { font-size: 9px; margin-top: 2px; color: #ccc; max-width: 140px; }
    .card .status { font-size: 8px; color: #666; margin-top: 1px; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="overlay">
    <div>🔥 AI UNIVERSE</div>
    <div id="fps">FPS: --</div>
    <div id="chars">Characters: 30</div>
  </div>
  <div id="hud"></div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    // === CAMERA ===
    let camAngleY = 0, camAngleX = -0.25, camDist = 25;
    let dragging = false, lastMX = 0, lastMY = 0;
    canvas.addEventListener('pointerdown', e => { dragging = true; lastMX = e.clientX; lastMY = e.clientY; });
    canvas.addEventListener('pointermove', e => {
      if (!dragging) return;
      camAngleY += (e.clientX - lastMX) * 0.005;
      camAngleX = Math.max(-1.0, Math.min(0.3, camAngleX + (e.clientY - lastMY) * 0.003));
      lastMX = e.clientX; lastMY = e.clientY;
    });
    canvas.addEventListener('pointerup', () => dragging = false);
    canvas.addEventListener('wheel', e => { camDist = Math.max(6, Math.min(50, camDist + e.deltaY * 0.02)); });

    // === 3D PROJECTION ===
    function project(x, y, z) {
      const cx = Math.cos(camAngleY), sx = Math.sin(camAngleY);
      const cy = Math.cos(camAngleX), sy = Math.sin(camAngleX);
      let rx = x * cx - z * sx;
      let rz = x * sx + z * cx;
      let ry = y * cy - rz * sy;
      rz = y * sy + rz * cy;
      rz += camDist;
      if (rz < 0.1) return null;
      const scale = 400;
      return { x: W/2 + (rx * scale) / rz, y: H/2 - (ry * scale) / rz, depth: rz, scale: scale / rz };
    }

    // === 30 CHARACTERS (10 men + 20 women) ===
    // Skin tones
    const SKIN = {
      light: '#f5d0a9',
      medium: '#c68642',
      tan: '#d4a574',
      bronze: '#a0522d',
      brown: '#8b6914',
      dark: '#5c4033',
      deep: '#3b2417'
    };

    const charData = [
      // 10 MEN — 2 Black, 2 Jamaican Black, rest mixed
      { id: 'marcus', name: 'Marcus Johnson', color: '#4488ff', gender: 'M', dialog: '', role: 'CEO', skin: SKIN.deep, build: 'athletic', desc: 'Black American' },
      { id: 'james', name: 'James Williams', color: '#ffaa00', gender: 'M', dialog: '', role: 'Investor', skin: SKIN.dark, build: 'broad', desc: 'Black American' },
      { id: 'omar', name: 'Omar Campbell', color: '#00ddff', gender: 'M', dialog: '', role: 'CTO', skin: SKIN.brown, build: 'athletic', desc: 'Jamaican Black' },
      { id: 'desmond', name: 'Desmond Blake', color: '#ff8844', gender: 'M', dialog: '', role: 'Engineer', skin: SKIN.deep, build: 'lean', desc: 'Jamaican Black' },
      { id: 'carlos', name: 'Carlos Rivera', color: '#aa44ff', gender: 'M', dialog: '', role: 'Designer', skin: SKIN.tan, build: 'athletic', desc: 'Colombian' },
      { id: 'miguel', name: 'Miguel Torres', color: '#88ff00', gender: 'M', dialog: '', role: 'Marketer', skin: SKIN.medium, build: 'lean', desc: 'Mexican' },
      { id: 'jin', name: 'Jin Park', color: '#ff4488', gender: 'M', dialog: '', role: 'Freelancer', skin: SKIN.light, build: 'lean', desc: 'Korean' },
      { id: 'rafael', name: 'Rafael Santos', color: '#44ffaa', gender: 'M', dialog: '', role: 'Lawyer', skin: SKIN.bronze, build: 'athletic', desc: 'Brazilian' },
      { id: 'kai', name: 'Kai Nakamura', color: '#ddff00', gender: 'M', dialog: '', role: 'Mentor', skin: SKIN.light, build: 'lean', desc: 'Japanese' },
      { id: 'tony', name: 'Anthony Brooks', color: '#00ff88', gender: 'M', dialog: '', role: 'Rival CEO', skin: SKIN.medium, build: 'broad', desc: 'Mixed' },
      // 20 WOMEN — Mostly Hispanic/Caribbean, couple Black, couple white
      { id: 'sofia', name: 'Sofia Martinez', color: '#ff44aa', gender: 'F', dialog: '', role: 'Co-Founder', skin: SKIN.tan, build: 'fit', desc: 'Colombian' },
      { id: 'valentina', name: 'Valentina Cruz', color: '#ff2266', gender: 'F', dialog: '', role: 'VP Eng', skin: SKIN.bronze, build: 'athletic', desc: 'Colombian' },
      { id: 'isabella', name: 'Isabella Rodriguez', color: '#aa44ff', gender: 'F', dialog: '', role: 'Product Lead', skin: SKIN.tan, build: 'fit', desc: 'Colombian' },
      { id: 'mariana', name: 'Mariana Lopez', color: '#ff88cc', gender: 'F', dialog: '', role: 'Sales Lead', skin: SKIN.medium, build: 'athletic', desc: 'Colombian' },
      { id: 'camila', name: 'Camila Gutierrez', color: '#ff4466', gender: 'F', dialog: '', role: 'PR Manager', skin: SKIN.bronze, build: 'fit', desc: 'Colombian' },
      { id: 'ana', name: 'Ana Patricia', color: '#ff6644', gender: 'F', dialog: '', role: 'CFO', skin: SKIN.tan, build: 'curvy', desc: 'Colombian' },
      { id: 'rosa', name: 'Rosa Hernandez', color: '#44aaff', gender: 'F', dialog: '', role: 'HR Director', skin: SKIN.tan, build: 'curvy', desc: 'Dominican' },
      { id: 'nayeli', name: 'Nayeli Fernandez', color: '#44ddff', gender: 'F', dialog: '', role: 'Strategist', skin: SKIN.medium, build: 'fit', desc: 'Puerto Rican' },
      { id: 'mia', name: 'Mia Torres', color: '#ffaa66', gender: 'F', dialog: '', role: 'Architect', skin: SKIN.tan, build: 'fit', desc: 'Puerto Rican' },
      { id: 'yolanda', name: 'Yolanda Vega', color: '#ddff00', gender: 'F', dialog: '', role: 'Accountant', skin: SKIN.bronze, build: 'athletic', desc: 'Dominican' },
      { id: 'carmen', name: 'Carmen Ruiz', color: '#ff44cc', gender: 'F', dialog: '', role: 'UX Researcher', skin: SKIN.medium, build: 'fit', desc: 'Mexican' },
      { id: 'leticia', name: 'Leticia Santos', color: '#66ff44', gender: 'F', dialog: '', role: 'Designer', skin: SKIN.bronze, build: 'fit', desc: 'Brazilian' },
      { id: 'luna', name: 'Luna Sanchez', color: '#8844ff', gender: 'F', dialog: '', role: 'Marketer', skin: SKIN.medium, build: 'athletic', desc: 'Mexican' },
      { id: 'naomi', name: 'Naomi Clarke', color: '#44ffcc', gender: 'F', dialog: '', role: 'Data Scientist', skin: SKIN.deep, build: 'fit', desc: 'Jamaican' },
      { id: 'shanice', name: 'Shanice Brown', color: '#ff6688', gender: 'F', dialog: '', role: 'Content Creator', skin: SKIN.brown, build: 'curvy', desc: 'Jamaican' },
      { id: 'keisha', name: 'Keisha Campbell', color: '#ff8844', gender: 'F', dialog: '', role: 'Influencer', skin: SKIN.deep, build: 'athletic', desc: 'Jamaican' },
      { id: 'aliyah', name: 'Aliyah Davis', color: '#ff8866', gender: 'F', dialog: '', role: 'Analyst', skin: SKIN.dark, build: 'athletic', desc: 'Black American' },
      { id: 'jasmine', name: 'Jasmine Okafor', color: '#66aaff', gender: 'F', dialog: '', role: 'Photographer', skin: SKIN.dark, build: 'athletic', desc: 'Nigerian' },
      { id: 'emma', name: 'Emma Wilson', color: '#aa66ff', gender: 'F', dialog: '', role: 'Intern', skin: SKIN.light, build: 'fit', desc: 'American' },
      { id: 'hanna', name: 'Hanna Brooks', color: '#44ff88', gender: 'F', dialog: '', role: 'QA Lead', skin: SKIN.light, build: 'fit', desc: 'American' },
    ];

    // Place characters in a scene layout
    const characters = charData.map((d, i) => {
      const angle = (i / 30) * Math.PI * 2;
      const radius = 4 + (i % 4) * 3;
      return {
        ...d,
        x: Math.cos(angle) * radius,
        z: Math.sin(angle) * radius,
        status: 'idle',
        animT: Math.random() * 10,
        tx: null, tz: null,
        walkSpeed: 1.5 + Math.random(),
        speaking: false,
        mouthTimer: 0
      };
    });

    // === DRAW CHARACTER ===
    function drawChar(c, t) {
      const bobY = c.status === 'idle' ? Math.sin(t * 2 + c.animT) * 0.04 :
                   Math.abs(Math.sin(t * 8)) * 0.12;

      // Walk
      if (c.tx !== null) {
        const dx = c.tx - c.x, dz = c.tz - c.z;
        const d = Math.sqrt(dx*dx + dz*dz);
        if (d > 0.2) {
          const spd = c.walkSpeed * 0.016;
          c.x += (dx/d) * spd; c.z += (dz/d) * spd;
        } else { c.tx = null; c.tz = null; c.status = 'idle'; }
      }

      const by = bobY;
      const headY = by + 1.8;

      // Body
      const bodyBot = project(c.x, by + 0.2, c.z);
      const bodyTop = project(c.x, by + 1.3, c.z);
      if (!bodyBot || !bodyTop) return;
      const bw = 22 * bodyBot.scale;
      const bh = bodyTop.y - bodyBot.y;
      // Body color (use accent + skin tones)
      const bodyColor = c.color;
      ctx.globalAlpha = 0.9;

      // Different body shapes by build
      if (c.gender === 'F') {
        const waist = c.build === 'curvy' ? bw * 0.5 : bw * 0.65;
        const hip = c.build === 'curvy' ? bw * 0.75 : bw * 0.7;
        // Torso with curves
        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        ctx.moveTo(bodyBot.x - bw/2, bodyBot.y);
        ctx.quadraticCurveTo(bodyBot.x - hip, (bodyBot.y + bodyTop.y)/2 + bh*0.2, bodyBot.x - waist, bodyTop.y + bh*0.3);
        ctx.quadraticCurveTo(bodyBot.x - waist*0.9, bodyTop.y + bh*0.05, bodyBot.x - bw*0.35, bodyTop.y);
        ctx.lineTo(bodyBot.x + bw*0.35, bodyTop.y);
        ctx.quadraticCurveTo(bodyBot.x + waist*0.9, bodyTop.y + bh*0.05, bodyBot.x + waist, bodyTop.y + bh*0.3);
        ctx.quadraticCurveTo(bodyBot.x + hip, (bodyBot.y + bodyTop.y)/2 + bh*0.2, bodyBot.x + bw/2, bodyBot.y);
        ctx.closePath();
        ctx.fill();
      } else {
        const w = c.build === 'broad' ? bw * 1.2 : (c.build === 'athletic' ? bw * 1.0 : bw * 0.85);
        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        ctx.moveTo(bodyBot.x - w/2, bodyBot.y);
        ctx.lineTo(bodyBot.x - w/2 * 0.7, bodyTop.y);
        ctx.lineTo(bodyBot.x + w/2 * 0.7, bodyTop.y);
        ctx.lineTo(bodyBot.x + w/2, bodyBot.y);
        ctx.closePath();
        ctx.fill();
        // Shoulders
        if (c.build !== 'lean') {
          ctx.beginPath();
          ctx.moveTo(bodyBot.x - w/2 * 0.7, bodyTop.y);
          ctx.lineTo(bodyBot.x - w/2, bodyTop.y - bh*0.1);
          ctx.lineTo(bodyBot.x + w/2, bodyTop.y - bh*0.1);
          ctx.lineTo(bodyBot.x + w/2 * 0.7, bodyTop.y);
          ctx.closePath();
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;

      // Head (skin tone)
      const hp = project(c.x, headY, c.z);
      if (!hp) return;
      const r = 11 * hp.scale;

      ctx.beginPath();
      ctx.arc(hp.x, hp.y, r, 0, Math.PI*2);
      ctx.fillStyle = c.skin || '#d4a574';
      ctx.fill();

      // Eyes
      const er = 2.2 * hp.scale;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(hp.x - r*0.3, hp.y - r*0.1, er, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(hp.x + r*0.3, hp.y - r*0.1, er, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(hp.x - r*0.26, hp.y - r*0.1, er*0.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(hp.x + r*0.26, hp.y - r*0.1, er*0.5, 0, Math.PI*2); ctx.fill();

      // Hair colors by character (diverse)
      const hairColors = ['#1a0a00', '#2d1810', '#4a2a10', '#0d0d0d', '#3a2215', '#1c1c1c', '#5c3a20', '#0a0a0a', '#2a1a0a', '#000000'];
      const hc = hairColors[c.id.charCodeAt(0) % hairColors.length];
      ctx.fillStyle = hc;
      if (c.gender === 'F') {
        // Long flowing hair
        ctx.beginPath();
        ctx.arc(hp.x, hp.y - r*0.1, r*1.15, Math.PI*0.85, Math.PI*2.15);
        ctx.fill();
        // Side hair flowing down
        ctx.beginPath();
        ctx.ellipse(hp.x - r*0.9, hp.y + r*0.4, r*0.25, r*0.7, 0.2, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(hp.x + r*0.9, hp.y + r*0.4, r*0.25, r*0.7, -0.2, 0, Math.PI*2);
        ctx.fill();
        // Hair top volume
        ctx.beginPath();
        ctx.arc(hp.x, hp.y - r*0.3, r*0.95, Math.PI*0.7, Math.PI*2.3);
        ctx.fill();
      } else {
        // Men's hair - varied styles
        ctx.beginPath();
        ctx.arc(hp.x, hp.y - r*0.2, r*1.08, Math.PI*0.75, Math.PI*2.25);
        ctx.fill();
        // Fade on sides
        ctx.beginPath();
        ctx.arc(hp.x, hp.y - r*0.1, r*1.15, Math.PI*1.2, Math.PI*1.8);
        ctx.fill();
      }

      // Mouth
      if (c.speaking) {
        const mo = 1 + Math.abs(Math.sin(t * 15)) * 2.5;
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.ellipse(hp.x, hp.y + r*0.35, r*0.18, mo, 0, 0, Math.PI*2);
        ctx.fill();
      } else {
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(hp.x, hp.y + r*0.3, r*0.15, 0.2, Math.PI-0.2);
        ctx.stroke();
      }

      // Name label
      const lbl = project(c.x, headY + 0.5, c.z);
      if (lbl && lbl.scale > 3) {
        ctx.font = `bold ${Math.max(8, 10 * lbl.scale)}px monospace`;
        ctx.fillStyle = c.color;
        ctx.textAlign = 'center';
        ctx.fillText(c.name, lbl.x, lbl.y);
      }
    }

    // === ENVIRONMENT ===
    function drawEnvironment() {
      // Floor
      ctx.fillStyle = '#111';
      ctx.fillRect(0, H * 0.6, W, H * 0.4);

      // Grid
      ctx.strokeStyle = '#1a1a2a';
      ctx.lineWidth = 0.5;
      for (let i = -30; i <= 30; i += 2) {
        const a = project(i, 0, -30);
        const b = project(i, 0, 30);
        if (a && b && a.y < H && b.y < H) {
          ctx.beginPath(); ctx.moveTo(a.x, Math.max(0,a.y)); ctx.lineTo(b.x, Math.max(0,b.y)); ctx.stroke();
        }
        const c1 = project(-30, 0, i);
        const d = project(30, 0, i);
        if (c1 && d && c1.y < H && d.y < H) {
          ctx.beginPath(); ctx.moveTo(c1.x, Math.max(0,c1.y)); ctx.lineTo(d.x, Math.max(0,d.y)); ctx.stroke();
        }
      }

      // Neon ring on floor
      const segments = 60;
      ctx.strokeStyle = '#00ff88';
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 10;
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i <= segments; i++) {
        const a = (i / segments) * Math.PI * 2;
        const p = project(Math.cos(a) * 8, 0, Math.sin(a) * 8);
        if (!p) continue;
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Center platform
      const platPts = [];
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        platPts.push(project(Math.cos(a) * 2, 0.15, Math.sin(a) * 2));
      }
      ctx.fillStyle = '#1a2a1a';
      ctx.beginPath();
      platPts.forEach((p, i) => {
        if (!p) return;
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      });
      ctx.closePath();
      ctx.fill();

      // "AI UNIVERSE" sign
      const txtP = project(0, 5, 0);
      if (txtP) {
        ctx.font = `bold ${Math.max(20, 36 * txtP.scale)}px monospace`;
        ctx.fillStyle = '#00ff88';
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 20;
        ctx.textAlign = 'center';
        ctx.fillText('AI UNIVERSE', txtP.x, txtP.y);
        ctx.shadowBlur = 0;
      }
    }

    function shadeColor(c, pct) {
      if (c.startsWith('#')) {
        let num = parseInt(c.slice(1), 16);
        let r = Math.max(0, Math.min(255, (num >> 16) + pct));
        let g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + pct));
        let b = Math.max(0, Math.min(255, (num & 0xff) + pct));
        return `rgb(${r},${g},${b})`;
      }
      return c;
    }

    // === SIM ENGINE ===
    const dialogs = [
      { t: 1, c: 'marcus', msg: "Welcome to AI Universe!" },
      { t: 3, c: 'sofia', msg: "This is incredible, papi!" },
      { t: 5, c: 'valentina', msg: "30 characters in real-time..." },
      { t: 7, c: 'ana', msg: "Our numbers are looking great." },
      { t: 9, c: 'omar', msg: "Deploying the new build now." },
      { t: 11, c: 'isabella', msg: "Users will love this update." },
      { t: 13, c: 'rosa', msg: "Team morale is at an all-time high." },
      { t: 15, c: 'camila', msg: "Press release is ready, mami!" },
      { t: 17, c: 'nayeli', msg: "The UI is next level." },
      { t: 19, c: 'shanice', msg: "Data shows 300% engagement!" },
      { t: 22, c: 'desmond', msg: "Legal approved the launch." },
      { t: 25, c: 'luna', msg: "Marketing campaign is ready!" },
      { t: 28, c: 'mia', msg: "Closing three deals this week." },
      { t: 31, c: 'keisha', msg: "Engineering is on track." },
      { t: 34, c: 'yolanda', msg: "Press release is drafted." },
      { t: 37, c: 'carlos', msg: "The design is fire, hermano." },
      { t: 40, c: 'aliyah', msg: "You're doing something special here." },
      { t: 45, c: 'leticia', msg: "All tests passing. Ship it!" },
      { t: 50, c: 'carmen', msg: "This is the future of AI." },
    ];

    let simSecond = 0;
    setInterval(() => {
      simSecond++;
      const events = dialogs.filter(d => d.t === simSecond);
      events.forEach(e => {
        const c = characters.find(ch => ch.id === e.c);
        if (c) {
          c.dialog = e.msg;
          c.speaking = true;
          setTimeout(() => c.speaking = false, 4000);
        }
      });

      // Random walking
      if (simSecond % 3 === 0) {
        const walker = characters[Math.floor(Math.random() * characters.length)];
        if (walker.status === 'idle') {
          walker.tx = (Math.random() - 0.5) * 14;
          walker.tz = (Math.random() - 0.5) * 14;
          walker.status = 'walking';
        }
      }
    }, 1000);

    // === HUD ===
    let hudVisible = characters.slice(0, 8);
    function updateHUD() {
      const hud = document.getElementById('hud');
      const speakers = characters.filter(c => c.speaking);
      const show = speakers.length ? speakers : hudVisible;
      hud.innerHTML = show.map(c => `
        <div class="card" style="border-color:${c.color}">
          <div class="name" style="color:${c.color}">${c.name}</div>
          <div class="dialog">${c.dialog || c.role}</div>
        </div>
      `).join('');
    }

    // Rotate visible characters in HUD
    setInterval(() => {
      const start = Math.floor(Math.random() * characters.length);
      hudVisible = [];
      for (let i = 0; i < 8; i++) {
        hudVisible.push(characters[(start + i) % characters.length]);
      }
    }, 5000);

    // === RENDER LOOP ===
    let frames = 0, fpsT = 0, lastT = performance.now();
    function loop(t) {
      requestAnimationFrame(loop);
      const dt = (t - lastT) / 1000;
      lastT = t;
      frames++; fpsT += dt;
      if (fpsT >= 1) {
        document.getElementById('fps').textContent = `FPS: ${frames}`;
        frames = 0; fpsT = 0;
      }

      // Sky
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#050510');
      grad.addColorStop(0.5, '#0a0a20');
      grad.addColorStop(1, '#10102a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Stars
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 50; i++) {
        const sx = (Math.sin(i * 127.1 + t * 0.0001) * 0.5 + 0.5) * W;
        const sy = (Math.cos(i * 311.7) * 0.5 + 0.5) * H * 0.5;
        const bright = Math.sin(t * 0.003 + i) * 0.3 + 0.7;
        ctx.globalAlpha = bright;
        ctx.fillRect(sx, sy, 1.5, 1.5);
      }
      ctx.globalAlpha = 1;

      drawEnvironment();

      // Sort by depth
      const sorted = characters.map(c => {
        const p = project(c.x, 1, c.z);
        return { c, depth: p ? p.depth : 999 };
      }).sort((a, b) => b.depth - a.depth);

      for (const { c } of sorted) {
        drawChar(c, t / 1000);
      }

      updateHUD();
    }
    requestAnimationFrame(loop);
    console.log('🔥 AI Universe loaded — 30 characters');
  </script>
</body>
</html>
